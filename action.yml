name: Sync Notion to Git
description: Easily sync the Notion pages you need to Git.
author: Batuhan Icoz
branding:
  icon: book-open
  color: blue
inputs:
  notion_token:
    description: Notion integration token with read permissions.
    required: true
  github_token:
    description: Token used for committing changes back to the repository.
    required: true
    default: ${{ github.token }}
  mode:
    description: Sync mode. Use "changed" for changed manifests or "full" for all manifests.
    required: false
    default: changed
  path_filter:
    description: Glob filter used to discover manifest files.
    required: false
    default: '**/.notion.txt'
  assets_dir:
    description: Reserved for future asset handling. Currently unused.
    required: false
    default: notion-assets
  commit:
    description: Commit generated changes back to the repository.
    required: false
    default: 'true'
  dry_run:
    description: If true, do not write files or create commits.
    required: false
    default: 'false'
  commit_user_name:
    description: Git author name for auto-commits.
    required: false
    default: github-actions[bot]
  commit_user_email:
    description: Git author email for auto-commits.
    required: false
    default: 41898282+github-actions[bot]@users.noreply.github.com
outputs:
  synced_pages:
    description: Number of Notion pages written to Markdown.
  synced_assets:
    description: Number of assets downloaded. Currently always 0.
  changed_files:
    description: Comma-separated list of Markdown files written by the action.
runs:
  using: node20
  main: dist/index.js
